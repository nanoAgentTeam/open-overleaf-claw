  - Agent should explicitly place the user's method within the school taxonomy, not just say "related to MoE"
  - Agent should assess saturation level of the user's specific sub-direction with evidence (paper count, publication frequency)
  - If saturation risk is detected, Agent should provide 2-3 concrete pivot directions with specific research angles (not generic suggestions)
  - Agent should distinguish between trends in the general MoE space vs the user's specific adaptive routing + load balancing niche
  - Agent should attempt `notify_push` and also output the full trend report in the conversation
