query: "请把 chinese_draft.tex 里的中文草稿翻译成学术英文，保留所有 LaTeX 格式（公式、\\cite{}、\\section{} 等），翻译后写入同一文件，替换原有中文内容。注意保持学术写作风格，不要意译过度。"
timeout_sec: 10800

expected_outcome:
  - Agent should read `contents/chinese_draft.tex` to get the Chinese content
  - Agent should translate all Chinese text to formal academic English
  - Agent should preserve all LaTeX markup: equations, \cite{}, \section{}, etc.
  - Agent should use `str_replace` or `write_file` to replace content in-place
